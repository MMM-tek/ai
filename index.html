<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blocker</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            overflow: hidden;
            cursor: none;
        }


        #custom-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            background-image: url('cursor.png');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 9999;
            display: none;
            left: 50%;
            top: 50%;
        }


        #simulator-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>


    <div id="custom-cursor"></div>
    <iframe id="simulator-frame" src="simulator.html"></iframe>


    <script>
        const frame = document.getElementById('simulator-frame');
        const cursor = document.getElementById('custom-cursor');



        async function activateFullControl() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                }


                document.body.requestPointerLock();


                if ('keyboard' in navigator && 'lock' in navigator.keyboard) {
                    await navigator.keyboard.lock(["Escape", "Tab", "AltLeft", "AltRight", "ControlLeft", "ControlRight", "MetaLeft", "MetaRight"]);
                }
            } catch (err) {
                console.error("Error al activar control total:", err);
            }
        }


        window.addEventListener('keydown', (e) => {
            const keysToBlock = ['Tab', 'Escape', 'Alt', 'Control', 'Meta'];
            if (keysToBlock.includes(e.key)) {
                e.preventDefault();
            }
        }, true);



        document.addEventListener('click', () => {
            activateFullControl();
        });


        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                cursor.style.display = 'block';
            } else {
                cursor.style.display = 'none';
                if (document.fullscreenElement) document.exitFullscreen();
            }
        });


        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                let x = cursor.offsetLeft + e.movementX;
                let y = cursor.offsetTop + e.movementY;


                x = Math.max(0, Math.min(window.innerWidth - 5, x));
                y = Math.max(0, Math.min(window.innerHeight - 5, y));


                cursor.style.left = x + 'px';
                cursor.style.top = y + 'px';
            }
        });


        frame.onerror = () => { frame.style.display = 'none'; };
        
        fetch('simulator.html').then(response => {
            if (!response.ok) frame.style.display = 'none';
        }).catch(() => {
            frame.style.display = 'none';
        });


    </script>
</body>
</html>
