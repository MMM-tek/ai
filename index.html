<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chat</title>
    <!-- Local JS from node_modules -->
    <script src="./tf.min.js"></script>
    <script src="./mobilenet.min.js"></script>
    <script src="./toxicity.min.js"></script>
    <script src="./speech-commands.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #212121;
            color: #ececf1;
            font-family: 'Sentry', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #444654;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: #343541;
            border: 1px solid #444;
        }

        .ai-msg img {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
        }

        /* Input Area (ChatGPT Style) */
        .input-area {
            background-color: #343541;
            padding: 20px;
            border-top: 1px solid #4d4d4f;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: #40414f;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            padding: 10px;
            display: flex;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            padding: 10px;
            outline: none;
            font-size: 16px;
            max-height: 200px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #acacbe;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 20px;
        }

        .btn-icon:hover { color: white; }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-msg">👋 Hello, I'm Nexus AI. I'm loading all my models... Please wait a moment.</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <!-- Upload Button -->
            <button class="btn-icon" onclick="document.getElementById('file-input').click()" title="Upload image">📎</button>
            <input type="file" id="file-input" accept="image/*">
            
            <!-- Microphone Button -->
            <button class="btn-icon" onclick="startVoiceRecognition()" title="Voice recognition">🎤</button>
            
            <!-- Text Input -->
            <textarea id="user-input" rows="1" placeholder="Type your question or message..."></textarea>
            
            <!-- Send Button -->
            <button class="btn-icon" onclick="handleSend()" title="Send">➡️</button>
        </div>
    </div>

    <script>
        let visionModel, toxicityModel, recognizer;
        let isListening = false;

        // Knowledge base for answering questions
        const knowledge = {
            "hello": "Hello! I'm your local AI assistant. I can analyze images, detect toxicity in text, recognize your voice, and answer questions.",
            "hi": "Hi there! I'm Nexus AI, your local artificial intelligence. How can I help you today?",
            "what are you": "I'm a local AI that runs in your browser using TensorFlow.js, MobileNet for vision, Toxicity for content moderation, and Speech Commands for voice recognition.",
            "help": "I can help you with:\n📷 Image classification using computer vision (MobileNet)\n🎤 Voice command recognition\n⚠️ Detect potentially offensive content\n💬 Answer questions\n📝 Process text",
            "who are you": "I'm Nexus AI, a local artificial intelligence that runs completely in your browser.",
            "thanks": "You're welcome! I'm here to help you with whatever you need.",
            "thank you": "You're welcome! I'm here to help you with whatever you need.",
            "goodbye": "Goodbye! See you later when you need help.",
            "bye": "Goodbye! See you later when you need help.",
            "time": () => new Date().toLocaleTimeString('en-US'),
            "date": () => new Date().toLocaleDateString('en-US'),
            "libraries": "I'm using: TensorFlow.js (foundation), MobileNet (vision), Toxicity (moderation), and Speech Commands (voice)",
            "capabilities": "My capabilities include:\n✓ Image classification\n✓ Toxicity detection\n✓ Voice command recognition\n✓ Natural language processing\n✓ Probability analysis with TensorFlow.js",
            "tensorflow": "TensorFlow.js is the foundation of my AI. It allows me to run machine learning models in your browser without sending data to external servers.",
            "mobilenet": "MobileNet is a convolutional neural network model I use to classify images. It can identify over 1000 different object categories.",
            "toxicity": "The toxicity model analyzes text to detect potentially offensive or harmful language. It's useful for content moderation.",
            "voice": "I recognize voice commands using Speech Commands. I can understand keywords in various languages.",
            "are you an ai": "Yes, I'm an artificial intelligence, but local. Everything runs in your browser without internet connection (except for initial model loading).",
            "working": "Yes, everything is working perfectly. Now I have all my libraries loaded and can help you with multiple tasks.",
            "image": "I can analyze images using MobileNet. Just click on 📎 and upload a photo. I'll tell you what object I think it is.",
            "security": "Privacy is important: everything is processed locally in your browser. Your data is not sent to any external server.",
            "how are you": "I'm functioning well, thank you for asking! Ready to help you with image analysis, voice commands, or any questions.",
            "features": "My main features are:\n📷 Image recognition with MobileNet\n🎤 Voice command detection\n⚠️ Content toxicity detection\n💬 Intelligent Q&A\n🔒 Local processing for privacy",
        };

        // Improved function to get responses
        function getResponse(text) {
            const lower = text.toLowerCase().trim();
            
            // Exact match search
            if (knowledge[lower] !== undefined) {
                const result = knowledge[lower];
                return typeof result === 'function' ? result() : result;
            }
            
            // Keyword search (by relevance order)
            for (let key in knowledge) {
                if (lower.includes(key)) {
                    const result = knowledge[key];
                    return typeof result === 'function' ? result() : result;
                }
            }
            
            // If it contains common questions
            if (lower.includes("?")) {
                const responses = [
                    "That's a great question. With my local AI capabilities, I can analyze images, detect inappropriate content, and answer questions.",
                    "Interesting. I'm running TensorFlow.js models: MobileNet for vision, Toxicity for moderation, and Speech Commands for voice.",
                    "Good question. My models analyze content in multiple ways. What specifically would you like to know?",
                    "Excellent question. I can help you with local AI tasks: image classification, text analysis, and voice recognition.",
                    "I'm here to help you. Would you like me to analyze an image, process voice, or answer something else?"
                ];
                return responses[Math.floor(Math.random() * responses.length)];
            }
            
            // Default contextual responses
            const defaultResponses = [
                "I understand. I'm processing your message with my local AI models.",
                "Interesting point. My knowledge integrates TensorFlow.js, computer vision, and text analysis.",
                "Thanks for sharing that. I suggest you ask questions about my capabilities (images, voice, moderation).",
                "Noted. Remember you can send me images (📎), voice commands (🎤), or text.",
                "Sure, understood. Is there something specific I can help you with using my AI tools?",
                "Fascinating. Would you like me to analyze an image or recognize a voice command about that?"
            ];
            return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
        }

        // Load models
        async function init() {
            console.log("🤖 Initializing Nexus AI...");
            try {
                console.log("📥 Loading TensorFlow.js...");
                // TensorFlow.js is automatically loaded
                
                console.log("📥 Loading MobileNet...");
                visionModel = await mobilenet.load();
                console.log("✓ MobileNet loaded successfully");
                
                console.log("📥 Loading Toxicity model...");
                toxicityModel = await toxicity.load(0.9);
                console.log("✓ Toxicity loaded successfully");
                
                console.log("📥 Loading Speech Commands...");
                recognizer = await speechCommands.create("BROWSER_FFT");
                await recognizer.ensureModelLoaded();
                console.log("✓ Speech Commands loaded successfully");
                
                const message = "✅ System fully operational!\n\nModels loaded:\n✓ TensorFlow.js (computational foundation)\n✓ MobileNet (image classification)\n✓ Toxicity (content detection)\n✓ Speech Commands (voice recognition)\n\nType 'help' to learn about my capabilities.";
                appendMessage(message, false);
            } catch (error) {
                console.error("Error loading models:", error);
                appendMessage("⚠️ Error loading models:\n" + error.message + "\nAttempting to continue with available models...", false);
            }
        }

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, isUser, imgSrc = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            
            if (imgSrc) {
                const img = document.createElement('img');
                img.src = imgSrc;
                msgDiv.appendChild(img);
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';

            try {
                // Validate toxicity
                const predictions = await toxicityModel.classify([text]);
                const isToxic = predictions.filter(p => p.results[0].match).length > 0;
                
                setTimeout(() => {
                    if (isToxic) {
                        appendMessage("⚠️ I've detected that your message contains inappropriate language. I suggest you rephrase it respectfully.", false);
                    } else {
                        const response = getResponse(text);
                        appendMessage(response, false);
                    }
                }, 600);
            } catch (error) {
                appendMessage("Error processing: " + error.message, false);
            }
        }

        // Análisis de imagen con MobileNet
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            appendMessage("Analizando imagen con MobileNet...", true, url);

            const img = new Image();
            img.src = url;
            img.onload = async () => {
                try {
                    const predictions = await visionModel.classify(img);
                    let response = "🖼️ Image analysis with MobileNet:\n\n";
                    predictions.slice(0, 5).forEach((pred, i) => {
                        const percentage = (pred.probability * 100).toFixed(2);
                        response += `${i + 1}. ${pred.className} (${percentage}%)\n`;
                    });
                    appendMessage(response, false);
                } catch (error) {
                    appendMessage("❌ Error analyzing image: " + error.message, false);
                }
            };
            img.onerror = () => {
                appendMessage("❌ Could not load the image", false);
            };
        };

        // Improved voice recognition
        async function startVoiceRecognition() {
            if (!recognizer) {
                appendMessage("❌ Voice recognition is not yet available. Wait for it to load completely.", false);
                return;
            }

            if (isListening) {
                appendMessage("⚠️ I'm already listening...", false);
                return;
            }

            isListening = true;
            appendMessage("🎤 Listening for voice command... (please wait)", true);

            const words = recognizer.wordList();
            console.log("Available words:", words);

            try {
                const result = await recognizer.listen(
                    async (output) => {
                        const scores = output.scores;
                        let maxScore = 0;
                        let maxIndex = 0;

                        scores.forEach((score, i) => {
                            if (score > maxScore) {
                                maxScore = score;
                                maxIndex = i;
                            }
                        });

                        if (maxScore > 0.7) {
                            const command = words[maxIndex];
                            console.log(`Detected: ${command} (confidence: ${maxScore.toFixed(2)})`);
                            appendMessage(`🎤 Command recognized: "${command}" (confidence: ${(maxScore * 100).toFixed(1)}%)`, true);
                            
                            const response = getResponse(command);
                            setTimeout(() => {
                                appendMessage(response, false);
                            }, 600);
                        }
                    },
                    { probabilityThreshold: 0.7 }
                );
            } catch (error) {
                console.log("Recognition finished");
            } finally {
                isListening = false;
            }
        }

        // Press Enter to send
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
