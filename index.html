<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chat</title>
    <!-- Local JS from node_modules -->
    <script src="./tf.min.js"></script>
    <script src="./mobilenet.min.js"></script>
    <script src="./toxicity.min.js"></script>
    <script src="./speech-commands.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #212121;
            color: #ececf1;
            font-family: 'Sentry', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #444654;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: #343541;
            border: 1px solid #444;
        }

        .ai-msg img {
            max-width: 120px;
            height: auto;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
        }

        /* Input Area (ChatGPT Style) */
        .input-area {
            background-color: #343541;
            padding: 20px;
            border-top: 1px solid #4d4d4f;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: #40414f;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            padding: 10px;
            display: flex;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            padding: 10px;
            outline: none;
            font-size: 16px;
            max-height: 200px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #acacbe;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 20px;
        }

        .btn-icon:hover { color: white; }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-msg">👋 Hello, I'm Nexus AI. I'm loading all my models... Please wait a moment.</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <!-- Upload Button -->
            <button class="btn-icon" onclick="document.getElementById('file-input').click()" title="Upload image">📎</button>
            <input type="file" id="file-input" accept="image/*">
            
            <!-- Microphone Button -->
            <button class="btn-icon" onclick="startVoiceRecognition()" title="Voice recognition">🎤</button>
            
            <!-- Text Input -->
            <textarea id="user-input" rows="1" placeholder="Type your question or message..."></textarea>
            
            <!-- Send Button -->
            <button class="btn-icon" onclick="handleSend()" title="Send">➡️</button>
        </div>
    </div>

    <script>
        let visionModel, toxicityModel, recognizer;
        let isListening = false;
        let isProcessing = false;

        // Detect language from text (Spanish vs English only)
        function detectLanguage(text) {
            const lower = text.toLowerCase().slice(0, 20);
            if (/^(hola|qué|por qué|cómo|cuándo|dónde|quién|sí|gracias|adiós|¡|¿)/.test(lower)) return 'es';
            return 'en'; // Default to English
        }

        // Advanced math solver for complex problems
        function solveMath(expr) {
            try {
                const clean = expr.replace(/[\s%]/g, '').slice(0, 100);
                // Support fractions, powers, square roots, etc
                const enhanced = clean
                    .replace(/\^/g, '**')
                    .replace(/√/g, 'Math.sqrt')
                    .replace(/sin/g, 'Math.sin')
                    .replace(/cos/g, 'Math.cos')
                    .replace(/tan/g, 'Math.tan')
                    .replace(/log/g, 'Math.log10')
                    .replace(/ln/g, 'Math.log');
                
                if (!/^[0-9+\-*/(). MathsqrtgincotnloxabetAB^]+$/.test(enhanced)) return null;
                const result = new Function('return ' + enhanced)();
                return isFinite(result) ? result : null;
            } catch (e) { return null; }
        }

        // Knowledge base for answering questions (English, Spanish, French)
        const knowledge = {
            // English
            "hello": "Hello! I'm your local AI assistant. I can analyze images, detect toxicity in text, recognize your voice, and answer questions.",
            "hi": "Hi there! I'm Nexus AI, your local artificial intelligence. How can I help you today?",
            "what are you": "I'm a local AI that runs in your browser using TensorFlow.js, MobileNet for vision, Toxicity for content moderation, and Speech Commands for voice recognition.",
            "help": "I can help you with:\n📷 Image classification using computer vision (MobileNet)\n🎤 Voice command recognition\n⚠️ Detect potentially offensive content\n💬 Answer questions\n📝 Process text",
            "who are you": "I'm Nexus AI, a local artificial intelligence that runs completely in your browser.",
            "thanks": "You're welcome! I'm here to help you with whatever you need.",
            "thank you": "You're welcome! I'm here to help you with whatever you need.",
            "goodbye": "Goodbye! See you later when you need help.",
            "bye": "Goodbye! See you later when you need help.",
            "time": () => new Date().toLocaleTimeString('en-US'),
            "date": () => new Date().toLocaleDateString('en-US'),
            "libraries": "I'm using: TensorFlow.js (foundation), MobileNet (vision), Toxicity (moderation), and Speech Commands (voice)",
            "capabilities": "My capabilities include:\n✓ Image classification\n✓ Toxicity detection\n✓ Voice command recognition\n✓ Natural language processing\n✓ Probability analysis with TensorFlow.js",
            "tensorflow": "TensorFlow.js is the foundation of my AI. It allows me to run machine learning models in your browser without sending data to external servers.",
            "mobilenet": "MobileNet is a convolutional neural network model I use to classify images. It can identify over 1000 different object categories.",
            "toxicity": "The toxicity model analyzes text to detect potentially offensive or harmful language. It's useful for content moderation.",
            "voice": "I recognize voice commands using Speech Commands. I can understand keywords in various languages.",
            "are you an ai": "Yes, I'm an artificial intelligence, but local. Everything runs in your browser without internet connection (except for initial model loading).",
            "working": "Yes, everything is working perfectly. Now I have all my libraries loaded and can help you with multiple tasks.",
            "image": "I can analyze images using MobileNet. Just click on 📎 and upload a photo. I'll tell you what object I think it is.",
            "security": "Privacy is important: everything is processed locally in your browser. Your data is not sent to any external server.",
            "how are you": "I'm functioning well, thank you for asking! Ready to help you with image analysis, voice commands, or any questions.",
            "features": "My main features are:\n📷 Image recognition with MobileNet\n🎤 Voice command detection\n⚠️ Content toxicity detection\n💬 Intelligent Q&A\n🔒 Local processing for privacy",
            // Spanish
            "hola": "¡Hola! Soy tu asistente de IA local. Puedo analizar imágenes, detectar toxicidad en textos, reconocer tu voz y responder preguntas.",
            "qué eres": "Soy una IA local que ejecuta en tu navegador usando TensorFlow.js, MobileNet para visión, Toxicity para moderar contenido y reconocimiento de voz.",
            "ayuda": "Puedo ayudarte con:\n📷 Clasificación de imágenes usando visión por computadora (MobileNet)\n🎤 Reconocimiento de comandos de voz\n⚠️ Detectar contenido potencialmente ofensivo\n💬 Responder preguntas\n📝 Procesar texto",
            "quién eres": "Soy Nexus AI, una inteligencia artificial local que funciona completamente en tu navegador.",
            "gracias": "¡De nada! Estoy aquí para ayudarte en lo que necesites.",
            "adiós": "¡Hasta luego! Vuelve cuando necesites ayuda.",
            "hora": () => new Date().toLocaleTimeString('es-ES'),
            "fecha": () => new Date().toLocaleDateString('es-ES'),
            "librerías": "Estoy usando: TensorFlow.js (base), MobileNet (visión), Toxicity (moderación) y Speech Commands (voz)",
            "capacidades": "Mis capacidades incluyen:\n✓ Clasificación de imágenes\n✓ Detección de toxicidad\n✓ Reconocimiento de comandos de voz\n✓ Procesamiento de lenguaje natural\n✓ Análisis de probabilidad con TensorFlow.js",
            "imagen": "Puedo analizar imágenes usando MobileNet. Solo haz clic en 📎 y sube una foto. Te diré qué objeto cree que es.",
            "seguridad": "La privacidad es importante: todo se procesa localmente en tu navegador. Tus datos no se envían a ningún servidor externo.",
            "cómo estás": "¡Funcionando bien, gracias por preguntar! Listo para ayudarte con análisis de imágenes, comandos de voz o cualquier pregunta.",
        };

        // Optimized response function with advanced math support
        function getResponse(text) {
            const lower = text.toLowerCase().trim();
            const lang = detectLanguage(text);
            
            // Try math solver
            const mathResult = solveMath(lower);
            if (mathResult !== null) {
                let formatted = mathResult.toString();
                // Format large decimals
                if (formatted.includes('.')) {
                    formatted = parseFloat(formatted).toFixed(4).replace(/\.?0+$/, '');
                }
                const results = { es: 'Resultado:', en: 'Result:' };
                return `${results[lang]} ${formatted}`;
            }
            
            // Exact match in knowledge base
            if (knowledge[lower]) {
                const result = knowledge[lower];
                return typeof result === 'function' ? result() : result;
            }
            
            // Quick keyword match
            const firstWord = lower.split(/\s+/)[0];
            if (knowledge[firstWord]) {
                const result = knowledge[firstWord];
                return typeof result === 'function' ? result() : result;
            }
            
            // Question patterns
            if (lower.includes("?")) {
                const qa = {
                    es: ["¿Cómo puedo ayudarte?", "Interesante pregunta.", "¿Algo más?"],
                    en: ["How can I help?", "That's a good question.", "Anything else?", "I'm here to assist."]
                };
                const responses = qa[lang] || qa['en'];
                return responses[Math.floor(Math.random() * responses.length)];
            }
            
            // Default responses
            const defaults = {
                es: ["Entiendo.", "Interesante.", "¿Necesitas ayuda?"],
                en: ["I understand.", "Interesting.", "How can I help?"]
            };
            const list = defaults[lang] || defaults['en'];
            return list[Math.floor(Math.random() * list.length)];
        }

        // Load models with lazy loading
        async function init() {
            console.log("🤖 Initializing Nexus AI...");
            appendMessage("⏳ Loading models...", false);
            
            try {
                // Load MobileNet first (faster, used more often)
                console.log("📥 Loading MobileNet...");
                visionModel = await mobilenet.load();
                console.log("✓ MobileNet loaded");
                
                // Load Toxicity in parallel
                console.log("📥 Loading Toxicity...");
                toxicityModel = await toxicity.load(0.9);
                console.log("✓ Toxicity loaded");
                
                // Load Speech Commands (can be slower)
                console.log("📥 Loading Speech Commands...");
                recognizer = await speechCommands.create("BROWSER_FFT");
                await recognizer.ensureModelLoaded();
                console.log("✓ Speech Commands loaded");
                
                // Replace loading message
                const chatContainer = document.getElementById('chat-container');
                const lastMsg = chatContainer.lastChild;
                if (lastMsg && lastMsg.innerText.includes("Loading")) {
                    lastMsg.innerText = "✅ Ready! I can:\n📷 Analyze images in detail\n🧮 Solve math problems\n💬 Answer questions in EN/ES";
                }
            } catch (error) {
                console.error("Error loading models:", error);
                appendMessage("⚠️ Some models failed to load, but I can still help with calculations and text.", false);
            }
        }

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, isUser, imgSrc = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            
            if (imgSrc) {
                const img = document.createElement('img');
                img.src = imgSrc;
                msgDiv.appendChild(img);
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function disableInput(disabled) {
            const textarea = document.getElementById('user-input');
            const buttons = document.querySelectorAll('.btn-icon');
            textarea.disabled = disabled;
            buttons.forEach(btn => btn.disabled = disabled);
            if (disabled) {
                textarea.style.opacity = '0.5';
                buttons.forEach(btn => btn.style.opacity = '0.5');
            } else {
                textarea.style.opacity = '1';
                buttons.forEach(btn => btn.style.opacity = '1');
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            disableInput(true);
            
            appendMessage(text, true);
            userInput.value = '';

            try {
                // Validate toxicity
                const predictions = await toxicityModel.classify([text]);
                const isToxic = predictions.filter(p => p.results[0].match).length > 0;
                
                setTimeout(() => {
                    if (isToxic) {
                        appendMessage("⚠️ I've detected that your message contains inappropriate language. I suggest you rephrase it respectfully.", false);
                    } else {
                        const response = getResponse(text);
                        appendMessage(response, false);
                    }
                    isProcessing = false;
                    disableInput(false);
                }, 600);
            } catch (error) {
                appendMessage("Error processing: " + error.message, false);
                isProcessing = false;
                disableInput(false);
            }
        }

        // Image analysis with MobileNet
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            isProcessing = true;
            disableInput(true);
            
            const url = URL.createObjectURL(file);
            appendMessage("Analyzing image with MobileNet...", true, url);

            const img = new Image();
            img.src = url;
            img.onload = async () => {
                try {
                    const predictions = await visionModel.classify(img);
                    // Show top 15 predictions for better accuracy
                    let response = "🖼️ Image Analysis Results:\n\n";
                    predictions.slice(0, 15).forEach((pred, i) => {
                        const percentage = (pred.probability * 100).toFixed(1);
                        const confidence = percentage >= 50 ? '✓' : percentage >= 20 ? '◐' : '◯';
                        response += `${confidence} ${i + 1}. ${pred.className} (${percentage}%)\n`;
                    });
                    response += "\n📌 Top match: " + predictions[0].className + " (" + (predictions[0].probability * 100).toFixed(1) + "%)";
                    appendMessage(response, false);
                } catch (error) {
                    appendMessage("❌ Error analyzing image: " + error.message, false);
                } finally {
                    isProcessing = false;
                    disableInput(false);
                }
            };
            img.onerror = () => {
                appendMessage("❌ Could not load the image", false);
                isProcessing = false;
                disableInput(false);
            };
        };

        // Improved voice recognition
        async function startVoiceRecognition() {
            if (!recognizer) {
                appendMessage("❌ Voice recognition is not yet available. Wait for it to load completely.", false);
                return;
            }

            if (isListening) {
                appendMessage("⚠️ I'm already listening...", false);
                return;
            }

            if (isProcessing) {
                appendMessage("⚠️ I'm still processing the previous message. Please wait.", false);
                return;
            }

            isListening = true;
            isProcessing = true;
            disableInput(true);
            
            appendMessage("🎤 Listening for voice command... (please wait)", true);

            const words = recognizer.wordList();
            console.log("Available words:", words);

            try {
                const result = await recognizer.listen(
                    async (output) => {
                        const scores = output.scores;
                        let maxScore = 0;
                        let maxIndex = 0;

                        scores.forEach((score, i) => {
                            if (score > maxScore) {
                                maxScore = score;
                                maxIndex = i;
                            }
                        });

                        if (maxScore > 0.7) {
                            const command = words[maxIndex];
                            console.log(`Detected: ${command} (confidence: ${maxScore.toFixed(2)})`);
                            appendMessage(`🎤 Command recognized: "${command}" (confidence: ${(maxScore * 100).toFixed(1)}%)`, true);
                            
                            const response = getResponse(command);
                            setTimeout(() => {
                                appendMessage(response, false);
                                isProcessing = false;
                                disableInput(false);
                            }, 600);
                        }
                    },
                    { probabilityThreshold: 0.7 }
                );
            } catch (error) {
                console.log("Recognition finished");
            } finally {
                isListening = false;
                if (isProcessing) {
                    isProcessing = false;
                    disableInput(false);
                }
            }
        }

        // Press Enter to send
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
