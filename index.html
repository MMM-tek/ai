<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chat</title>
    <!-- Local JS from node_modules -->
    <script src="./tf.min.js"></script>
    <script src="./mobilenet.min.js"></script>
    <script src="./toxicity.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #212121;
            color: #ececf1;
            font-family: 'Sentry', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #444654;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: #343541;
            border: 1px solid #444;
        }

        .ai-msg img {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
        }

        /* Input Area (ChatGPT Style) */
        .input-area {
            background-color: #343541;
            padding: 20px;
            border-top: 1px solid #4d4d4f;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: #40414f;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            padding: 10px;
            display: flex;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            padding: 10px;
            outline: none;
            font-size: 16px;
            max-height: 200px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #acacbe;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 20px;
        }

        .btn-icon:hover { color: white; }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-msg">Hello! I am your local AI. You can type a message or upload an image to analyze it.</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <!-- Upload Button -->
            <button class="btn-icon" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="file" id="file-input" accept="image/*">
            
            <!-- Text Input -->
            <textarea id="user-input" rows="1" placeholder="Send a message..."></textarea>
            
            <!-- Send Button -->
            <button class="btn-icon" onclick="handleSend()">➡️</button>
        </div>
    </div>

    <script>
        let visionModel, toxicityModel;

        // Load models
        async function init() {
            visionModel = await mobilenet.load();
            toxicityModel = await toxicity.load(0.9);
            console.log("Models loaded");
        }

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, isUser, imgSrc = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            
            if (imgSrc) {
                const img = document.createElement('img');
                img.src = imgSrc;
                msgDiv.appendChild(img);
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';

            // AI Logic for text (Toxicity)
            const predictions = await toxicityModel.classify([text]);
            const isToxic = predictions.filter(p => p.results[0].match).length > 0;
            
            setTimeout(() => {
                const response = isToxic 
                    ? "⚠️ I've detected that your message might be offensive." 
                    : "I understand. I'm a local AI running in your browser!";
                appendMessage(response, false);
            }, 600);
        }

        // Handle Image Upload
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            appendMessage("Analyzing this image...", true, url);

            // Create temporary image element for AI
            const img = new Image();
            img.src = url;
            img.onload = async () => {
                const predictions = await visionModel.classify(img);
                appendMessage(`AI Vision: I think this is a ${predictions[0].className}.`, false);
            };
        };

        // Send with Enter key
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        init();
    </script>
</body>
</html>
